<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Part 2 — Variant 1 (Hero cover)</title>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #040405; font-family: 'Albert Sans', sans-serif; display: flex; justify-content: center; }
  .frame {
    width: 375px;
    min-height: 812px;
    background: #040405;
    color: #fff;
    overflow: hidden;
    position: relative;
    padding-bottom: 24px;
  }
  /* Hero with cover */
  .hero {
    position: relative;
    width: 100%;
    height: 480px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(4,4,5,0) 0%, rgba(4,4,5,0) 45%, rgba(4,4,5,0.85) 80%, #040405 100%);
    pointer-events: none;
  }
  .top-bar {
    position: absolute;
    top: 16px; left: 20px; right: 20px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 2;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(4,4,5,0.5);
    border: 1px solid #363842;
    display: flex; align-items: center; justify-content: center;
    color: #DADDE3;
  }
  .eyebrow {
    position: absolute;
    bottom: 130px; left: 20px;
    font: 700 10px/13px 'Albert Sans';
    letter-spacing: 0.24em;
    color: #DADDE3;
    text-transform: uppercase;
    z-index: 2;
  }
  .hero-title {
    position: absolute;
    bottom: 86px; left: 20px; right: 20px;
    font: 700 28px/34px 'Albert Sans';
    letter-spacing: -1.12px;
    color: #fff;
    z-index: 2;
  }
  .countdown-row {
    position: absolute;
    bottom: 36px; left: 20px;
    display: flex; gap: 8px; align-items: center;
    z-index: 2;
  }
  .day-pill {
    background: #12141E;
    border: 1px solid #363842;
    border-radius: 10px;
    padding: 8px 12px;
    display: flex; flex-direction: column; align-items: center;
    min-width: 44px;
  }
  .day-pill .num { font: 700 18px/20px 'Albert Sans'; color: #fff; letter-spacing: -0.26px; }
  .day-pill .lbl { font: 500 10px/13px 'Albert Sans'; color: #9499A3; letter-spacing: 0.24em; text-transform: uppercase; margin-top: 2px;}
  /* CTA section */
  .cta-section {
    margin-top: -24px;
    padding: 0 20px;
    position: relative;
    z-index: 3;
  }
  .cta-primary {
    width: 100%;
    height: 48px;
    background: #4500FF;
    border: none;
    border-radius: 8px;
    color: #fff;
    font: 700 18px/23px 'Albert Sans';
    letter-spacing: -0.26px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    cursor: pointer;
  }
  .cta-helper {
    margin-top: 10px;
    font: 400 13px/17px 'Albert Sans';
    color: #9499A3;
    text-align: center;
    letter-spacing: -0.09px;
  }
  /* Recommendations */
  .rec-section { margin-top: 28px; }
  .rec-header {
    padding: 0 20px;
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .rec-title {
    font: 700 20px/22px 'Albert Sans';
    letter-spacing: -0.46px;
    color: #fff;
  }
  .rec-link {
    font: 500 14px/19px 'Albert Sans';
    color: #6678FF;
    letter-spacing: -0.13px;
  }
  .rec-scroll {
    display: flex; gap: 12px;
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .rec-scroll::-webkit-scrollbar { display: none; }
  .rec-card {
    flex: 0 0 auto;
    width: 120px;
  }
  .rec-card img {
    width: 120px; height: 180px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    border: 1px solid #20222C;
  }
  .rec-card .name {
    margin-top: 8px;
    font: 600 14px/19px 'Albert Sans';
    color: #fff;
    letter-spacing: -0.13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rec-card .meta {
    margin-top: 2px;
    font: 400 12px/16px 'Albert Sans';
    color: #9499A3;
    letter-spacing: -0.06px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="hero">
      <img src="https://alex03292303.github.io/drama-style-plugin/covers/13.jpg" alt="cover" />
      <div class="top-bar">
        <div class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
      </div>
      <div class="eyebrow">Part 1 finale</div>
      <div class="hero-title">Part 2 drops in 7 days</div>
      <div class="countdown-row">
        <div class="day-pill"><div class="num">07</div><div class="lbl">Days</div></div>
        <div class="day-pill"><div class="num">00</div><div class="lbl">Hrs</div></div>
        <div class="day-pill"><div class="num">00</div><div class="lbl">Min</div></div>
      </div>
    </div>

    <div class="cta-section">
      <button class="cta-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        Notify me
      </button>
      <div class="cta-helper">We'll send a push and email when it's live</div>
    </div>

    <div class="rec-section">
      <div class="rec-header">
        <div class="rec-title">While you wait</div>
        <a class="rec-link">See all</a>
      </div>
      <div class="rec-scroll">
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/10.jpg" alt="" />
          <div class="name">Bound by Fate</div>
          <div class="meta">Romance · 24 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/11.jpg" alt="" />
          <div class="name">Crown of Lies</div>
          <div class="meta">Drama · 32 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/12.jpg" alt="" />
          <div class="name">Silent Vow</div>
          <div class="meta">Romance · 18 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/14.jpg" alt="" />
          <div class="name">Wolf's Promise</div>
          <div class="meta">Werewolf · 28 ep</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
