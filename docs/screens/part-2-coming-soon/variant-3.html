<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Part 2 — Variant 3 (Calendar stage)</title>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #040405; font-family: 'Albert Sans', sans-serif; display: flex; justify-content: center; }
  .frame {
    width: 375px;
    min-height: 812px;
    background: #040405;
    color: #fff;
    position: relative;
    padding: 16px 0 24px;
  }
  .top-bar {
    padding: 0 20px;
    display: flex; justify-content: space-between; align-items: center;
    height: 44px;
  }
  .top-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid #363842;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: #DADDE3;
  }
  .screen-title {
    padding: 0 20px;
    margin-top: 8px;
    font: 700 28px/34px 'Albert Sans';
    letter-spacing: -1.12px;
    color: #fff;
  }
  .screen-sub {
    padding: 0 20px;
    margin-top: 6px;
    font: 400 15px/20px 'Albert Sans';
    letter-spacing: -0.19px;
    color: #DADDE3;
  }

  /* Hero card with cover thumb + countdown */
  .hero-card {
    margin: 24px 20px 0;
    background: #1C1E28;
    border: 1px solid #363842;
    border-radius: 20px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: "";
    position: absolute;
    width: 200px; height: 200px;
    right: -60px; top: -60px;
    background: radial-gradient(closest-side, rgba(69,0,255,0.22), transparent 70%);
    pointer-events: none;
  }
  .hero-card img {
    width: 88px; height: 132px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid #20222C;
    flex-shrink: 0;
  }
  .hero-meta { position: relative; flex: 1; min-width: 0; }
  .hero-eyebrow {
    font: 700 10px/13px 'Albert Sans';
    letter-spacing: 0.24em;
    color: #6678FF;
    text-transform: uppercase;
  }
  .hero-name {
    margin-top: 6px;
    font: 700 18px/23px 'Albert Sans';
    letter-spacing: -0.26px;
    color: #fff;
  }
  .hero-tag {
    margin-top: 4px;
    font: 400 13px/17px 'Albert Sans';
    color: #9499A3;
  }
  .hero-pill {
    display: inline-flex;
    align-items: center; gap: 6px;
    margin-top: 12px;
    padding: 6px 10px;
    background: #12141E;
    border: 1px solid #363842;
    border-radius: 999px;
    font: 600 13px/17px 'Albert Sans';
    color: #fff;
    letter-spacing: -0.09px;
  }
  .hero-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4500FF;
  }

  /* 7-day countdown rail */
  .rail-label {
    margin: 24px 20px 10px;
    font: 600 13px/17px 'Albert Sans';
    letter-spacing: 0.24em;
    color: #9499A3;
    text-transform: uppercase;
  }
  .rail {
    margin: 0 20px;
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .day {
    flex: 1;
    height: 60px;
    border-radius: 12px;
    border: 1px solid #363842;
    background: #12141E;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
  }
  .day .d { font: 500 10px/13px 'Albert Sans'; letter-spacing: 0.24em; color: #9499A3; text-transform: uppercase; }
  .day .n { font: 700 16px/21px 'Albert Sans'; letter-spacing: -0.21px; color: #fff; }
  .day.active {
    background: #4500FF;
    border-color: #4500FF;
  }
  .day.active .d { color: #DADDE3; }
  .day.active .n { color: #fff; }

  /* CTA */
  .cta-block { padding: 24px 20px 0; }
  .cta-primary {
    width: 100%;
    height: 48px;
    background: #4500FF;
    border: none;
    border-radius: 8px;
    color: #fff;
    font: 700 18px/23px 'Albert Sans';
    letter-spacing: -0.26px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    cursor: pointer;
  }
  .channel-row {
    margin-top: 12px;
    display: flex; gap: 8px; justify-content: center;
    font: 400 13px/17px 'Albert Sans';
    color: #9499A3;
  }
  .channel-row span { color: #DADDE3; font-weight: 500; }

  /* Recs */
  .rec-section { margin-top: 28px; }
  .rec-header {
    padding: 0 20px;
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .rec-title {
    font: 700 20px/22px 'Albert Sans';
    letter-spacing: -0.46px;
    color: #fff;
  }
  .rec-link {
    font: 500 14px/19px 'Albert Sans';
    color: #6678FF;
  }
  .rec-scroll {
    display: flex; gap: 12px;
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .rec-scroll::-webkit-scrollbar { display: none; }
  .rec-card {
    flex: 0 0 auto;
    width: 110px;
  }
  .rec-card img {
    width: 110px; height: 165px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    border: 1px solid #20222C;
  }
  .rec-card .name {
    margin-top: 8px;
    font: 600 13px/17px 'Albert Sans';
    color: #fff;
    letter-spacing: -0.09px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rec-card .meta {
    font: 400 11px/15px 'Albert Sans';
    color: #9499A3;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-bar">
      <button class="top-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <button class="top-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="12" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle><circle cx="20" cy="12" r="1.5"></circle></svg>
      </button>
    </div>

    <h1 class="screen-title">Part 1 finished</h1>
    <div class="screen-sub">Part 2 arrives in 7 days. We'll let you know.</div>

    <div class="hero-card">
      <img src="https://alex03292303.github.io/drama-style-plugin/covers/19.jpg" alt="cover" />
      <div class="hero-meta">
        <div class="hero-eyebrow">Continues soon</div>
        <div class="hero-name">Crimson Vow</div>
        <div class="hero-tag">Romance · Part 2</div>
        <div class="hero-pill"><span class="dot"></span>New episodes May 5</div>
      </div>
    </div>

    <div class="rail-label">Drops in</div>
    <div class="rail">
      <div class="day"><div class="d">Tue</div><div class="n">29</div></div>
      <div class="day"><div class="d">Wed</div><div class="n">30</div></div>
      <div class="day"><div class="d">Thu</div><div class="n">1</div></div>
      <div class="day"><div class="d">Fri</div><div class="n">2</div></div>
      <div class="day"><div class="d">Sat</div><div class="n">3</div></div>
      <div class="day"><div class="d">Sun</div><div class="n">4</div></div>
      <div class="day active"><div class="d">Mon</div><div class="n">5</div></div>
    </div>

    <div class="cta-block">
      <button class="cta-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        Notify me
      </button>
      <div class="channel-row">Push <span>·</span> Email</div>
    </div>

    <div class="rec-section">
      <div class="rec-header">
        <div class="rec-title">More to watch</div>
        <a class="rec-link">See all</a>
      </div>
      <div class="rec-scroll">
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/10.jpg" alt="" />
          <div class="name">Bound by Fate</div>
          <div class="meta">24 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/12.jpg" alt="" />
          <div class="name">Silent Vow</div>
          <div class="meta">18 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/14.jpg" alt="" />
          <div class="name">Wolf's Promise</div>
          <div class="meta">28 ep</div>
        </div>
        <div class="rec-card">
          <img src="https://alex03292303.github.io/drama-style-plugin/covers/17.jpg" alt="" />
          <div class="name">Heir Apparent</div>
          <div class="meta">30 ep</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
